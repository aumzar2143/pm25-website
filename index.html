<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyAir HealthyLife PM2.5 - Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
transition:background 1s;
background:linear-gradient(135deg,#74b9ff,#dfe6e9);
}

h2{
color:white;
margin-top:20px;
text-shadow:0 2px 5px rgba(0,0,0,0.4);
}

.card{
background:rgba(255,255,255,0.92);
margin:20px auto;
padding:25px;
border-radius:20px;
max-width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

#pmValue{
font-size:80px;
font-weight:bold;
transition:0.5s;
}

button{
padding:10px 16px;
border:none;
border-radius:12px;
margin:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.refresh{background:#00b894;color:white;}
.gps{background:#0984e3;color:white;}
.export{background:#fdcb6e;}

.rank{
background:#f1f5f9;
padding:12px;
margin:6px;
border-radius:10px;
}

.highlight{
border:2px solid #0984e3;
background:#eaf4ff;
}

#map{
height:420px;
border-radius:15px;
}

canvas{
max-height:320px;
}

.advice ul{
text-align:left;
max-width:600px;
margin:auto;
}

.alertBox{
display:none;
background:#ff4d4d;
color:white;
padding:15px;
font-size:18px;
font-weight:bold;
}

.popupAlert{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
display:none;
z-index:999;
animation:pop 0.5s;
}

@keyframes pop{
0%{transform:scale(0.6) translate(-50%,-50%)}
100%{transform:scale(1) translate(-50%,-50%)}
}

</style>
</head>

<body>

<div id="alertBar" class="alertBox">
🚨 ค่าฝุ่นสูงเกินมาตรฐาน กรุณาสวมหน้ากาก N95
</div>

<div id="popup" class="popupAlert">
<h2>🚨 แจ้งเตือนค่าฝุ่น</h2>
<p>ค่าฝุ่น PM2.5 สูงเกินมาตรฐาน</p>
<button onclick="closePopup()">ปิด</button>
</div>

<h2>🌫 HappyAir HealthyLife PM2.5 - Lampang</h2>

<div class="card">

<div id="pmValue">--</div>

<p id="statusText">กำลังโหลดข้อมูล...</p>

<p id="locationText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>

<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

</div>


<div class="card advice">

<h3>🩺 คำแนะนำสุขภาพ</h3>

<div id="healthAdvice"></div>

</div>


<div class="card">

<h3>🗺 แผนที่คุณภาพอากาศ</h3>

<div id="map"></div>

</div>


<div class="card">

<h3>📊 กราฟ PM2.5</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>🏆 อันดับอำเภอ</h3>

<div id="ranking"></div>

</div>


<div class="card">

<button class="export" onclick="exportCSV()">📥 Export CSV</button>

</div>



<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let map
let chart
let markers=[]
let userDistrict=null

const districts={
"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]
}

function aqiColor(pm){
if(pm<=25)return"#2ecc71"
if(pm<=50)return"#f1c40f"
if(pm<=100)return"#e67e22"
if(pm<=150)return"#e74c3c"
return"#8e44ad"
}

function setBackground(pm){

let bg=""

if(pm<=25)bg="linear-gradient(135deg,#2ecc71,#a8e6cf)"
else if(pm<=50)bg="linear-gradient(135deg,#f1c40f,#ffeaa7)"
else if(pm<=100)bg="linear-gradient(135deg,#e67e22,#fab1a0)"
else if(pm<=150)bg="linear-gradient(135deg,#e74c3c,#ff7675)"
else bg="linear-gradient(135deg,#8e44ad,#c39bd3)"

document.body.style.background=bg
}

function healthAdvice(pm){

let html="<ul>"

if(pm<=25){
html+=`
<li>สามารถทำกิจกรรมกลางแจ้งได้</li>
<li>เหมาะสำหรับออกกำลังกาย</li>
<li>เด็กและผู้สูงอายุใช้ชีวิตได้ปกติ</li>
`
}

else if(pm<=50){
html+=`
<li>ทำกิจกรรมกลางแจ้งได้</li>
<li>ผู้แพ้ฝุ่นควรสังเกตอาการ</li>
<li>ควรดื่มน้ำมากขึ้น</li>
`
}

else if(pm<=100){
html+=`
<li>ควรใส่หน้ากาก N95</li>
<li>ลดกิจกรรมกลางแจ้ง</li>
<li>ปิดหน้าต่างบ้าน</li>
<li>ใช้เครื่องฟอกอากาศ</li>
`
}

else{
html+=`
<li>หลีกเลี่ยงกิจกรรมกลางแจ้ง</li>
<li>สวมหน้ากาก N95</li>
<li>อยู่ในอาคาร</li>
<li>ใช้เครื่องฟอกอากาศ</li>
<li>เด็กและผู้สูงอายุควรระวัง</li>
`
}

html+="</ul>"

return html

}

function showAlert(){

document.getElementById("alertBar").style.display="block"
document.getElementById("popup").style.display="block"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

async function fetchPM(lat,lon){
const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
const data=await res.json()
return data.data.iaqi.pm25?data.data.iaqi.pm25.v:0
}

function initMap(){
map=L.map('map').setView([18.3,99.5],9)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
}

async function loadAll(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]
let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

}

results.sort((a,b)=>b.pm-a.pm)

let rankingHTML=""

results.forEach((d,i)=>{

let cls="rank"
if(d.name===userDistrict)cls+=" highlight"

rankingHTML+=`<div class="${cls}">${i+1}. ${d.name} - ${d.pm} µg/m³</div>`

let circle=L.circle([d.lat,d.lon],{
radius:7000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.6
}).addTo(map)

markers.push(circle)

})

document.getElementById("ranking").innerHTML=rankingHTML

let pm=results[0].pm

document.getElementById("pmValue").innerText=pm
document.getElementById("statusText").innerText="PM2.5 "+pm+" µg/m³"

document.getElementById("healthAdvice").innerHTML=healthAdvice(pm)

setBackground(pm)

if(pm>100)showAlert()

loadChart(results.map(r=>r.pm))

}

function loadChart(data){

if(chart)chart.destroy()

chart=new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:Object.keys(districts),
datasets:[{
label:"PM2.5",
data:data
}]
}
}
)

}

function exportCSV(){

let csv="District,PM2.5\n"

document.querySelectorAll(".rank").forEach(el=>{
csv+=el.innerText+"\n"
})

let blob=new Blob([csv],{type:"text/csv"})
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="pm25_lampang.csv"
a.click()

}

initMap()
loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
