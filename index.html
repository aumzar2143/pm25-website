<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

h1{text-align:center}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.refresh{background:#00c853;color:white}
.gps{background:#2962ff;color:white}

#map{
height:420px;
border-radius:10px;
}

.rank{
background:#0f172a;
margin:5px;
padding:10px;
border-radius:8px;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🌫 PM2.5 จังหวัดลำปาง</h1>

<div class="card">

<h2 id="pmValue">--</h2>
<p id="statusText">กำลังโหลด...</p>

<button class="refresh" onclick="loadAll()">รีเฟรช</button>
<button class="gps" onclick="useGPS()">ใช้ GPS</button>

</div>

<div class="card">

<h3>🩺 คำแนะนำการป้องกันฝุ่น (กรมอนามัย)</h3>
<p id="healthAdvice">กำลังโหลด...</p>

</div>

<div class="card">

<h3>🗺 แผนที่ Heatmap ฝุ่น</h3>
<div id="map"></div>

</div>

<div class="grid">

<div class="card">

<h3>📈 แนวโน้ม PM2.5</h3>
<canvas id="lineChart"></canvas>

</div>

<div class="card">

<h3>📊 เปรียบเทียบอำเภอ</h3>
<canvas id="barChart"></canvas>

</div>

</div>

<div class="card">

<h3>🏆 อันดับอำเภอ</h3>
<div id="ranking"></div>

</div>

</div>


<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let lineChart
let barChart
let heatLayer

let map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}

function advice(pm){

if(pm<=25) return "🟢 อากาศดี"

if(pm<=50) return "🟡 เริ่มมีผลกระทบ"

if(pm<=100) return "🟠 มีผลต่อสุขภาพ"

if(pm<=150) return "🔴 เริ่มอันตราย"

return "🟣 อันตรายมาก"

}

function healthAdvice(pm){

if(pm<=25){

return `
อากาศอยู่ในเกณฑ์ดี

• สามารถทำกิจกรรมกลางแจ้งได้
• เปิดบ้านระบายอากาศได้
`

}

if(pm<=50){

return `
เริ่มมีผลกระทบต่อสุขภาพ

• กลุ่มเสี่ยงควรระวัง
• หากออกนอกบ้านควรสวมหน้ากาก
`

}

if(pm<=100){

return `
มีผลกระทบต่อสุขภาพ

• สวมหน้ากาก N95
• ลดกิจกรรมกลางแจ้ง
• กลุ่มเสี่ยงควรหลีกเลี่ยงฝุ่น
`

}

if(pm<=150){

return `
เริ่มอันตรายต่อสุขภาพ

• สวมหน้ากาก N95 ทุกครั้ง
• หลีกเลี่ยงกิจกรรมกลางแจ้ง
• ปิดประตูหน้าต่างบ้าน
`

}

return `
อันตรายต่อสุขภาพ

• หลีกเลี่ยงออกจากบ้าน
• ใช้เครื่องฟอกอากาศ
• กลุ่มเสี่ยงควรอยู่ในอาคาร
`

}

async function fetchPM(lat,lon){

let res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
let data=await res.json()

return data.data.iaqi.pm25?data.data.iaqi.pm25.v:0

}

async function loadAll(){

let results=[]
let heatData=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

heatData.push([lat,lon,pm/150])

}

results.sort((a,b)=>b.pm-a.pm)

let html=""

results.forEach((d,i)=>{

html+=`<div class="rank">${i+1}. ${d.name} - ${d.pm} µg/m³</div>`

})

document.getElementById("ranking").innerHTML=html

let labels=results.map(r=>r.name)
let values=results.map(r=>r.pm)

let mainPM=results[0].pm

document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText=advice(mainPM)
document.getElementById("healthAdvice").innerText=healthAdvice(mainPM)

createCharts(labels,values)

createHeatmap(heatData)

}

function createCharts(labels,data){

if(lineChart) lineChart.destroy()
if(barChart) barChart.destroy()

lineChart=new Chart(
document.getElementById("lineChart"),
{
type:"line",
data:{
labels:labels,
datasets:[{label:"PM2.5",data:data}]
}
}
)

barChart=new Chart(
document.getElementById("barChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[{label:"PM2.5",data:data}]
}
}
)

}

function createHeatmap(data){

if(heatLayer) map.removeLayer(heatLayer)

heatLayer=L.heatLayer(data,{
radius:35,
blur:25
}).addTo(map)

}

function useGPS(){

navigator.geolocation.getCurrentPosition(

pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

map.setView([lat,lon],11)

L.marker([lat,lon]).addTo(map)

}

)

}

loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
