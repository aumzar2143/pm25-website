<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Health Monitoring System - Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',system-ui;
background:#eef5f9;
color:#1a2b3c;
text-align:center;
}

h2{
color:#0a6ebd;
margin-top:15px;
}

.card{
background:white;
margin:20px auto;
padding:25px;
border-radius:18px;
max-width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
border-left:6px solid #0a6ebd;
}

#pmValue{
font-size:70px;
font-weight:bold;
color:#0a6ebd;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
margin:6px;
font-size:14px;
cursor:pointer;
}

.refresh{
background:#00b894;
color:white;
}

.gps{
background:#0984e3;
color:white;
}

.export{
background:#fdcb6e;
}

.rank{
background:#f4f7fb;
margin:6px;
padding:12px;
border-radius:10px;
}

.highlight{
border:2px solid #0984e3;
}

#map{
height:400px;
border-radius:12px;
}

</style>

</head>

<body>

<h2>🩺 PM2.5 Health Monitoring System - Lampang</h2>

<div class="card">

<h1 id="pmValue">--</h1>
<p id="statusText">กำลังโหลด...</p>
<p id="aqiText"></p>
<p id="locationText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>
<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

</div>


<div class="card">

<h3>🩺 คำแนะนำสุขภาพ</h3>
<p id="healthAdvice"></p>

</div>


<div class="card">

<h3>📊 แนวโน้ม PM2.5</h3>
<canvas id="chart"></canvas>

<p id="avgText"></p>
<p id="maxText"></p>
<p id="minText"></p>

</div>


<div class="card">

<h3>🏆 อันดับอำเภอ</h3>
<div id="ranking"></div>

</div>


<div class="card">

<h3>🗺 แผนที่ฝุ่น</h3>
<div id="map"></div>

</div>


<div class="card">

<button class="export" onclick="exportCSV()">📥 Export CSV</button>

</div>



<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let chart
let map
let markers=[]
let userDistrict=null
let userMarker=null


const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}


function aqiColor(pm){

if(pm<=25) return "#2ecc71"
if(pm<=50) return "#f1c40f"
if(pm<=100) return "#e67e22"
if(pm<=150) return "#e74c3c"
return "#ff0000"

}


function advice(pm){

if(pm<=25) return "🟢 อากาศดี"
if(pm<=50) return "🟡 เริ่มมีผลกระทบ"
if(pm<=100) return "🟠 ควรใส่หน้ากาก"
if(pm<=150) return "🔴 หลีกเลี่ยงกิจกรรมกลางแจ้ง"
return "🚨 อันตรายมาก"

}


function healthAdvice(pm){

if(pm<=25){

return `

คุณภาพอากาศดีมาก
• สามารถทำกิจกรรมกลางแจ้งได้
• เหมาะสำหรับการออกกำลังกาย
• เด็กและผู้สูงอายุทำกิจกรรมภายนอกได้

`

}

if(pm<=50){

return `

คุณภาพอากาศปานกลาง
• บุคคลทั่วไปทำกิจกรรมกลางแจ้งได้
• ผู้ป่วยโรคหอบหืดควรระวัง

`

}

if(pm<=100){

return `

เริ่มมีผลกระทบต่อสุขภาพ
• สวมหน้ากาก N95
• ลดกิจกรรมกลางแจ้ง

`

}

if(pm<=150){

return `

มีผลกระทบต่อสุขภาพ
• หลีกเลี่ยงกิจกรรมกลางแจ้ง
• ใช้เครื่องฟอกอากาศ

`

}

return `

อันตรายมาก
• หลีกเลี่ยงออกจากบ้าน
• สวมหน้ากาก N95

`

}


function pmToAQI(pm){

return Math.round(pm*4)

}


async function fetchPM(lat,lon){

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)

const data=await res.json()

let pm=data.data.iaqi.pm25?data.data.iaqi.pm25.v:0

return pm

}


function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}


async function loadAll(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

}

results.sort((a,b)=>b.pm-a.pm)

let html=""

results.forEach((d,i)=>{

let cls="rank"

if(d.name===userDistrict) cls+=" highlight"

html+=`<div class="${cls}">
${i+1}. ${d.name} - ${d.pm} µg/m³
</div>`

let circle=L.circle([d.lat,d.lon],{
radius:7000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.5
}).addTo(map)
.bindPopup(d.name+"<br>"+d.pm+" µg/m³")

markers.push(circle)

})

document.getElementById("ranking").innerHTML=html

let values=results.map(r=>r.pm)

let mainPM=results[0].pm

let avg=values.reduce((a,b)=>a+b)/values.length

let max=Math.max(...values)

let min=Math.min(...values)

document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText=advice(mainPM)
document.getElementById("healthAdvice").innerText=healthAdvice(mainPM)
document.getElementById("aqiText").innerText="AQI ประมาณ: "+pmToAQI(mainPM)
document.getElementById("avgText").innerText="ค่าเฉลี่ยจังหวัด: "+avg.toFixed(2)
document.getElementById("maxText").innerText="ค่าสูงสุด: "+max
document.getElementById("minText").innerText="ค่าต่ำสุด: "+min

loadChart(values)

}


function loadChart(data){

if(chart) chart.destroy()

chart=new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:Object.keys(districts),
datasets:[
{
label:"PM2.5",
data:data
}
]
}
}
)

}


function useGPS(){

navigator.geolocation.getCurrentPosition(

pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("locationText").innerText=
"📍 "+lat.toFixed(4)+","+lon.toFixed(4)

if(userMarker){
map.removeLayer(userMarker)
}

userMarker=L.circleMarker([lat,lon],{
radius:10,
color:"#0984e3",
fillColor:"#74b9ff",
fillOpacity:1,
weight:3
}).addTo(map)
.bindPopup("📍 ตำแหน่งของคุณ")
.openPopup()

map.setView([lat,lon],12)

userDistrict=findClosest(lat,lon)

loadAll()

}

)

}


function findClosest(lat,lon){

let min=999999
let closest=null

for(const name in districts){

let [dlat,dlon]=districts[name]

let dist=Math.hypot(lat-dlat,lon-dlon)

if(dist<min){

min=dist
closest=name

}

}

return closest

}


function exportCSV(){

let csv="District,PM2.5\n"

document.querySelectorAll(".rank").forEach(el=>{

csv+=el.innerText.replace(" - ",",")+"\n"

})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="pm25_lampang.csv"

a.click()

}


initMap()
loadAll()
setInterval(loadAll,300000)

</script>

</body>
</html>
