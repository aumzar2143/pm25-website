<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 ลำปาง Research Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
color:white;
text-align:center;
transition:0.4s;
background:#111;
}

.container{
max-width:1100px;
margin:auto;
padding:10px;
}

h2{
margin-top:20px;
}

.card{
background:rgba(0,0,0,0.65);
margin:15px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
backdrop-filter:blur(8px);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
margin:5px;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.refresh{background:#00c853;color:white;}
.gps{background:#2962ff;color:white;}
.export{background:#ffc107;color:black;}

.rank{
background:#1a1a1a;
margin:6px;
padding:10px;
border-radius:10px;
}

.highlight{
border:2px solid white;
}

canvas{
max-width:100%;
}

@media(max-width:800px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h2>🌫️ PM2.5 จังหวัดลำปาง</h2>

<div class="card">

<h1 id="pmValue">--</h1>
<p id="statusText">กำลังโหลด...</p>
<p id="locationText"></p>
<p id="aqiText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>
<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

</div>


<div class="card">

<h3>🩺 คำแนะนำการป้องกันฝุ่น</h3>
<p id="healthAdvice">กำลังโหลด...</p>

</div>


<div class="grid">

<div class="card">

<h3>📈 แนวโน้ม PM2.5</h3>
<canvas id="lineChart"></canvas>

</div>

<div class="card">

<h3>📊 เปรียบเทียบ PM2.5 รายอำเภอ</h3>
<canvas id="barChart"></canvas>

</div>

</div>


<div class="card">

<p id="avgText"></p>
<p id="maxText"></p>
<p id="minText"></p>

</div>


<div class="card">

<h3>🏆 อันดับอำเภอในลำปาง</h3>
<div id="ranking"></div>

</div>


<div class="card">

<button class="export" onclick="exportCSV()">📥 Export CSV</button>

</div>

</div>


<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let lineChart
let barChart
let userDistrict=null

const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}

function setBG(pm){

if(pm<=25) document.body.style.background="#2e7d32"
else if(pm<=50) document.body.style.background="#f9a825"
else if(pm<=100) document.body.style.background="#ef6c00"
else if(pm<=150) document.body.style.background="#c62828"
else document.body.style.background="#6a1b9a"

}

function advice(pm){

if(pm<=25) return "🟢 อากาศดี"
if(pm<=50) return "🟡 เริ่มมีผลกระทบ"
if(pm<=100) return "🟠 ควรใส่หน้ากาก N95"
if(pm<=150) return "🔴 หลีกเลี่ยงกิจกรรมกลางแจ้ง"
return "🟣 อันตรายมาก"

}

function pmToAQI(pm){
return Math.round(pm*4)
}

async function fetchPM(lat,lon){

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
const data=await res.json()

return data.data.iaqi.pm25?data.data.iaqi.pm25.v:0

}

async function loadAll(){

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm})

}

results.sort((a,b)=>b.pm-a.pm)

let html=""

results.forEach((d,i)=>{

let cls="rank"

if(d.name===userDistrict) cls+=" highlight"

html+=`<div class="${cls}">
${i+1}. ${d.name} - ${d.pm} µg/m³
</div>`

})

document.getElementById("ranking").innerHTML=html

let labels=results.map(r=>r.name)
let values=results.map(r=>r.pm)

let mainPM=results[0].pm

let avg=values.reduce((a,b)=>a+b)/values.length
let max=Math.max(...values)
let min=Math.min(...values)

document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText=advice(mainPM)
document.getElementById("aqiText").innerText="AQI ประมาณ: "+pmToAQI(mainPM)

document.getElementById("avgText").innerText="ค่าเฉลี่ยจังหวัด: "+avg.toFixed(2)
document.getElementById("maxText").innerText="ค่าสูงสุด: "+max
document.getElementById("minText").innerText="ค่าต่ำสุด: "+min

setBG(mainPM)

loadCharts(labels,values)

}

function loadCharts(labels,data){

if(lineChart) lineChart.destroy()
if(barChart) barChart.destroy()

lineChart=new Chart(

document.getElementById("lineChart"),

{
type:"line",
data:{
labels:labels,
datasets:[{
label:"PM2.5",
data:data,
fill:false,
tension:0.3
}]
}
}

)

barChart=new Chart(

document.getElementById("barChart"),

{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"PM2.5",
data:data
}]
}
}

)

}

function useGPS(){

navigator.geolocation.getCurrentPosition(

async pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("locationText").innerText=
"📍 พิกัด: "+lat.toFixed(4)+","+lon.toFixed(4)

userDistrict=findClosest(lat,lon)

loadAll()

}

)

}

function findClosest(lat,lon){

let min=999999
let closest=null

for(const name in districts){

let [dlat,dlon]=districts[name]

let dist=Math.hypot(lat-dlat,lon-dlon)

if(dist<min){

min=dist
closest=name

}

}

return closest

}

function exportCSV(){

let csv="District,PM2.5\n"

document.querySelectorAll(".rank").forEach(el=>{

csv+=el.innerText.replace(" - ",",")+"\n"

})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="pm25_lampang.csv"

a.click()

}

loadAll()

</script>

</body>
</html>
