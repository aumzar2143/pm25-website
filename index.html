<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Research Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.refresh{background:#00c853;color:white}
.gps{background:#2962ff;color:white}

#map{
height:500px;
border-radius:10px;
}

.rank{
background:#0f172a;
margin:5px;
padding:10px;
border-radius:8px;
}

.highlight{
border:2px solid white;
}

</style>
</head>

<body>

<div class="container">

<h1>🌫 PM2.5 จังหวัดลำปาง (Research Platform)</h1>

<div class="card">

<h2 id="pmValue">--</h2>
<p id="statusText">กำลังโหลด...</p>

<button class="refresh" onclick="loadStations()">รีเฟรช</button>
<button class="gps" onclick="useGPS()">ใช้ GPS</button>

</div>

<div class="card">
<h3>🩺 คำแนะนำสุขภาพ</h3>
<p id="healthAdvice"></p>
</div>

<div class="card">
<h3>🗺 Realtime Sensor Network</h3>
<div id="map"></div>
</div>

<div class="grid">

<div class="card">
<h3>📈 PM2.5 Trend</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>📊 District Compare</h3>
<canvas id="barChart"></canvas>
</div>

</div>

<div class="card">
<h3>🏆 District Ranking</h3>
<div id="ranking"></div>
</div>

</div>

<script>

const token="demo"

let map=L.map('map').setView([18.3,99.5],8)
let markers=[]
let heatLayer
let lineChart
let barChart
let userDistrict=null
let userMarker=null

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

function getAQIColor(pm){

if(pm<=12) return "#00e400"
if(pm<=35) return "#ffff00"
if(pm<=55) return "#ff7e00"
if(pm<=150) return "#ff0000"
if(pm<=250) return "#8f3f97"
return "#7e0023"

}

function healthAdvice(pm){

if(pm<=12)
return "อากาศดีมาก สามารถทำกิจกรรมกลางแจ้งได้"

if(pm<=35)
return "อากาศดี แต่กลุ่มเสี่ยงควรระวัง"

if(pm<=55)
return "กลุ่มเสี่ยงควรสวมหน้ากาก"

if(pm<=150)
return "ควรสวม N95 และลดกิจกรรมกลางแจ้ง"

if(pm<=250)
return "หลีกเลี่ยงกิจกรรมกลางแจ้ง"

return "อันตรายต่อสุขภาพ ควรอยู่ในอาคาร"

}

async function loadStations(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let res=await fetch("https://api.waqi.info/map/bounds/?token="+token+"&latlng=5,95,25,110")
let data=await res.json()

let heatData=[]
let results=[]

data.data.forEach(st=>{

let pm=st.aqi
let lat=st.lat
let lon=st.lon

if(pm==="-" || pm>500) return

let color=getAQIColor(pm)

let circle=L.circleMarker([lat,lon],{

radius:Math.max(5,pm/5),
color:color,
fillOpacity:0.8

}).addTo(map)

circle.bindPopup(`
สถานี: ${st.station.name}<br>
PM2.5: ${pm}
`)

markers.push(circle)

heatData.push([lat,lon,pm/200])

results.push({name:st.station.name,pm:pm})

})

createHeatmap(heatData)
createRanking(results)
createCharts(results)

}

function createHeatmap(data){

if(heatLayer) map.removeLayer(heatLayer)

heatLayer=L.heatLayer(data,{
radius:35,
blur:25
}).addTo(map)

}

function createRanking(results){

results.sort((a,b)=>b.pm-a.pm)

let html=""

results.slice(0,10).forEach((r,i)=>{

html+=`<div class="rank">${i+1}. ${r.name} - ${r.pm}</div>`

})

document.getElementById("ranking").innerHTML=html

let mainPM=results[0].pm

document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText="AQI "+mainPM
document.getElementById("healthAdvice").innerText=healthAdvice(mainPM)

}

function createCharts(results){

let labels=results.slice(0,10).map(r=>r.name)
let values=results.slice(0,10).map(r=>r.pm)

if(lineChart) lineChart.destroy()
if(barChart) barChart.destroy()

lineChart=new Chart(
document.getElementById("lineChart"),
{
type:"line",
data:{labels:labels,datasets:[{label:"PM2.5",data:values}]}
}
)

barChart=new Chart(
document.getElementById("barChart"),
{
type:"bar",
data:{labels:labels,datasets:[{label:"PM2.5",data:values}]}
}
)

}

function useGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

map.setView([lat,lon],10)

if(userMarker) map.removeLayer(userMarker)

userMarker=L.marker([lat,lon]).addTo(map).bindPopup("ตำแหน่งของคุณ")

})

}

loadStations()

setInterval(loadStations,300000)

</script>

</body>
</html>
