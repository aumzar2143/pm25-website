<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyAir HealthyLife PM2.5 - Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
transition:background 1s;
background:linear-gradient(135deg,#74b9ff,#dfe6e9);
overflow-x:hidden;
}

canvas#particles{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:-1;
}

h2{
color:white;
margin-top:20px;
text-shadow:0 2px 5px rgba(0,0,0,0.3);
}

.card{
background:rgba(255,255,255,0.92);
margin:20px auto;
padding:25px;
border-radius:20px;
max-width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

#pmValue{
font-size:80px;
font-weight:bold;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
margin:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
position:relative;
overflow:hidden;
}

button:hover{
transform:scale(1.05);
}

button:after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,0.4);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:0.6s;
}

button:active:after{
width:200px;
height:200px;
opacity:0;
}

.refresh{background:#00b894;color:white;}
.gps{background:#0984e3;color:white;}

.rank{
background:#f1f5f9;
padding:12px;
margin:6px;
border-radius:10px;
}

#map{
height:420px;
border-radius:15px;
}

.alert{
background:#ff4d4d;
color:white;
padding:10px;
display:none;
font-weight:bold;
animation:pulseAlert 1s infinite;
}

@keyframes pulseAlert{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.sensor{
animation:pulseSensor 2s infinite;
}

@keyframes pulseSensor{
0%{opacity:0.6;}
50%{opacity:1;}
100%{opacity:0.6;}
}

.legend{
text-align:left;
max-width:420px;
margin:auto;
}

#advice ul{
text-align:left;
max-width:600px;
margin:auto;
}

#loading{
display:none;
font-size:18px;
margin:10px;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="alertBox" class="alert">
🚨 ค่าฝุ่นเกินมาตรฐาน ควรสวมหน้ากาก N95
</div>

<h2>🌫 HappyAir HealthyLife PM2.5 - Lampang</h2>

<div id="loading">⏳ กำลังโหลดข้อมูล...</div>

<div class="card">

<canvas id="gauge"></canvas>

<div id="pmValue">--</div>

<p id="statusText">กำลังโหลดข้อมูล...</p>

<p id="locationText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>
<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

</div>

<div class="card">

<h3>🩺 คำแนะนำสุขภาพ</h3>
<div id="advice"></div>

</div>

<div class="card">

<h3>🗺 แผนที่คุณภาพอากาศ</h3>
<div id="map"></div>

<div class="legend">
<b>ระดับคุณภาพอากาศ</b>
<div>🟢 0-25 ดี</div>
<div>🟡 26-50 ปานกลาง</div>
<div>🟠 51-100 เริ่มกระทบ</div>
<div>🔴 101-150 มีผลต่อสุขภาพ</div>
<div>🟣 151+ อันตราย</div>
</div>

</div>

<div class="card">

<h3>📊 กราฟ PM2.5</h3>
<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>🏆 อันดับอำเภอ</h3>
<div id="ranking"></div>

</div>

<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let map
let chart
let gauge
let heat
let markers=[]

const districts={
"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]
}

function aqiColor(pm){
if(pm<=25)return"#2ecc71"
if(pm<=50)return"#f1c40f"
if(pm<=100)return"#e67e22"
if(pm<=150)return"#e74c3c"
return"#8e44ad"
}

function animatePM(value){

let start=0
let step=value/60

let interval=setInterval(()=>{

start+=step

if(start>=value){
start=value
clearInterval(interval)
}

document.getElementById("pmValue").innerText=
Math.floor(start)+" µg/m³"

},16)

}

function healthAdvice(pm){

let html="<ul>"

if(pm<=25){
html+="<li>อากาศดี สามารถทำกิจกรรมกลางแจ้งได้</li>"
html+="<li>เหมาะสำหรับออกกำลังกาย</li>"
}

else if(pm<=50){
html+="<li>อากาศปานกลาง</li>"
html+="<li>ผู้แพ้ฝุ่นควรระวัง</li>"
}

else if(pm<=100){
html+="<li>ควรใส่หน้ากาก N95</li>"
html+="<li>ลดกิจกรรมกลางแจ้ง</li>"
}

else{
html+="<li>หลีกเลี่ยงกิจกรรมกลางแจ้ง</li>"
html+="<li>สวมหน้ากาก N95</li>"
}

html+="</ul>"

return html

}

async function fetchPM(lat,lon){

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
const data=await res.json()

return data.data.iaqi.pm25 ? data.data.iaqi.pm25.v : 0

}

function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

async function loadAll(){

document.getElementById("loading").style.display="block"

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

}

results.sort((a,b)=>b.pm-a.pm)

let heatData=[]

let rankingHTML=""

results.forEach((d,i)=>{

heatData.push([d.lat,d.lon,d.pm])

rankingHTML+=`<div class="rank">${i+1}. ${d.name} - ${d.pm} µg/m³</div>`

let circle=L.circleMarker([d.lat,d.lon],{
radius:15,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.8,
className:"sensor"
}).addTo(map)

markers.push(circle)

})

document.getElementById("ranking").innerHTML=rankingHTML

if(heat)map.removeLayer(heat)

heat=L.heatLayer(heatData,{radius:35}).addTo(map)

let mainPM=results[0].pm

animatePM(mainPM)

document.getElementById("statusText").innerText="ระดับฝุ่น "+mainPM

document.getElementById("advice").innerHTML=healthAdvice(mainPM)

if(mainPM>100)
document.getElementById("alertBox").style.display="block"

loadChart(results.map(r=>r.pm))

loadGauge(mainPM)

document.getElementById("loading").style.display="none"

}

function loadChart(data){

if(chart)chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:Object.keys(districts),
datasets:[{
label:"PM2.5",
data:data
}]
},
options:{animation:true}
})

}

function loadGauge(pm){

if(gauge)gauge.destroy()

gauge=new Chart(document.getElementById("gauge"),{
type:"doughnut",
data:{
datasets:[{
data:[pm,200-pm],
backgroundColor:[aqiColor(pm),"#ecf0f1"]
}]
},
options:{
circumference:180,
rotation:270,
plugins:{legend:{display:false}}
}
})

}

function useGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

L.marker([lat,lon]).addTo(map)
.bindPopup("ตำแหน่งของคุณ")

map.setView([lat,lon],11)

})

}

initMap()
loadAll()

setInterval(loadAll,300000)


// particle dust effect

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
v:Math.random()*0.5
})
}

function drawParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.3)"
ctx.fill()

p.y+=p.v

if(p.y>canvas.height)p.y=0

})

requestAnimationFrame(drawParticles)

}

drawParticles()

</script>

</body>
</html>
