<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyAir HealthyLife PM2.5 - Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#e8f5e9;
transition:0.5s;
}

h1{
margin-top:10px;
}

#pm{
font-size:60px;
font-weight:bold;
}

#advice{
font-size:18px;
margin:10px;
}

#map{
height:300px;
margin:15px;
border-radius:15px;
}

canvas{
max-width:600px;
margin:auto;
}

</style>

</head>

<body>

<h1>🌫 HappyAir HealthyLife</h1>
<h2>PM2.5 จังหวัดลำปาง</h2>

<div id="pm">กำลังโหลด...</div>
<div id="status"></div>
<div id="advice"></div>

<div id="map"></div>

<canvas id="chart"></canvas>

<audio id="notifySound">
<source src="https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3">
</audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([18.2888,99.4908],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map)

let marker
let circle

function getColor(pm){

if(pm<=25) return "green"
if(pm<=50) return "yellow"
if(pm<=90) return "orange"
if(pm<=150) return "red"
return "purple"

}

function getAdvice(pm){

if(pm<=25) return "อากาศดีมาก สามารถทำกิจกรรมกลางแจ้งได้ตามปกติ"

if(pm<=50) return "อากาศดี แต่ผู้แพ้ฝุ่นควรสังเกตอาการ"

if(pm<=90) return "เริ่มมีผลกระทบ ควรใส่หน้ากากเมื่อออกนอกบ้าน"

if(pm<=150) return "อากาศไม่ดี ควรหลีกเลี่ยงกิจกรรมกลางแจ้ง"

return "อันตรายมาก ควรอยู่ในอาคารและใช้เครื่องฟอกอากาศ"

}

async function loadPM(){

let url="https://api.waqi.info/feed/lampang/?token=demo"

let res=await fetch(url)
let data=await res.json()

let pm=data.data.iaqi.pm25.v

document.getElementById("pm").innerText=pm
document.getElementById("status").innerText="µg/m³"

document.getElementById("advice").innerText=getAdvice(pm)

document.body.style.background=getColor(pm)

updateMap(pm)
updateChart(pm)

checkAlert(pm)

}

function updateMap(pm){

let color=getColor(pm)

if(marker) map.removeLayer(marker)
if(circle) map.removeLayer(circle)

marker=L.marker([18.2888,99.4908]).addTo(map)
.bindPopup("ค่าฝุ่น "+pm)

circle=L.circle([18.2888,99.4908],{
color:color,
fillColor:color,
fillOpacity:0.4,
radius:8000
}).addTo(map)

}

let chart

function updateChart(pm){

if(!chart){

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:[],
datasets:[{
label:"PM2.5",
data:[],
borderWidth:3
}]
}

})

}

chart.data.labels.push(new Date().toLocaleTimeString())
chart.data.datasets[0].data.push(pm)

chart.update()

}

function checkAlert(pm){

let hour=new Date().getHours()

if((hour==6||hour==18)&&pm>90){

document.getElementById("notifySound").play()

alert("🚨 ค่าฝุ่นเกินมาตรฐาน\nPM2.5 = "+pm)

sendLine(pm)

}

}

function sendLine(pm){

let token="YOUR_LINE_TOKEN"

fetch("https://notify-api.line.me/api/notify",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded",
"Authorization":"Bearer "+token
},

body:"message=🚨 PM2.5 Lampang = "+pm

})

}

function scheduleAlert(){

let now=new Date()

let target1=new Date()
target1.setHours(6,0,0)

let target2=new Date()
target2.setHours(18,0,0)

let diff1=target1-now
let diff2=target2-now

if(diff1<0) diff1+=86400000
if(diff2<0) diff2+=86400000

setTimeout(()=>{
loadPM()
},diff1)

setTimeout(()=>{
loadPM()
},diff2)

}

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

L.marker([lat,lon]).addTo(map)
.bindPopup("📍 ตำแหน่งของคุณ")

})

loadPM()

setInterval(loadPM,600000)

scheduleAlert()

</script>

</body>
</html>
