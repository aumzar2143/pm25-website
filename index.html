<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Research AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
margin:15px;
padding:20px;
border-radius:20px;
}

#map{
height:420px;
border-radius:20px;
}

.rank{
background:#334155;
margin:6px;
padding:10px;
border-radius:10px;
}

.good{color:#22c55e}
.mid{color:#eab308}
.bad{color:#f97316}
.danger{color:#ef4444}

</style>

</head>

<body>

<h2>🌫 PM2.5 จังหวัดลำปาง Research AI Dashboard</h2>

<div class="card">

<h1 id="pmValue">--</h1>

<p id="status"></p>

<p id="aqi"></p>

</div>


<div class="card">

<h3>🩺 คำแนะนำสุขภาพ</h3>

<p id="health"></p>

</div>


<div class="card">

<h3>🗺 แผนที่ฝุ่น + Heatmap</h3>

<div id="map"></div>

</div>


<div class="card">

<h3>📊 PM2.5 รายอำเภอ</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>📈 แนวโน้ม 24 ชั่วโมง</h3>

<canvas id="chart24"></canvas>

</div>


<div class="card">

<h3>🌬 PM2.5 vs Wind</h3>

<canvas id="windChart"></canvas>

</div>


<div class="card">

<h3>🌡 PM2.5 vs Temperature</h3>

<canvas id="tempChart"></canvas>

</div>


<div class="card">

<h3>🤖 AI Prediction 72 ชั่วโมง</h3>

<canvas id="predict"></canvas>

</div>


<div class="card">

<h3>📊 สถิติ</h3>

<p id="mean"></p>
<p id="max"></p>
<p id="min"></p>
<p id="sd"></p>

</div>


<div class="card">

<h3>🏆 Ranking</h3>

<div id="ranking"></div>

</div>


<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let chart
let chart24
let windChart
let tempChart
let predictChart

let map=L.map("map").setView([18.3,99.5],8)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)


const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}


async function fetchPM(lat,lon){

let res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)

let data=await res.json()

return data.data.iaqi.pm25?data.data.iaqi.pm25.v:0

}


function advice(pm){

if(pm<=25) return {text:"อากาศดี",c:"good"}

if(pm<=50) return {text:"เริ่มมีผลกระทบ",c:"mid"}

if(pm<=100) return {text:"ควรใส่หน้ากาก",c:"bad"}

return {text:"อันตรายต่อสุขภาพ",c:"danger"}

}


function healthAdvice(pm){

if(pm<=25) return "ทำกิจกรรมกลางแจ้งได้ตามปกติ"

if(pm<=50) return "กลุ่มเสี่ยงควรสวมหน้ากาก"

if(pm<=100) return "สวมหน้ากาก N95 และลดกิจกรรมกลางแจ้ง"

if(pm<=150) return "หลีกเลี่ยงกิจกรรมกลางแจ้ง"

return "ควรอยู่ในอาคารและใช้เครื่องฟอกอากาศ"

}


function pmToAQI(pm){

return Math.round(pm*4)

}


async function loadAll(){

let results=[]
let heat=[]

for(let name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

heat.push([lat,lon,pm/150])

}


results.sort((a,b)=>b.pm-a.pm)

drawHeat(heat)

results.forEach(d=>{

L.marker([d.lat,d.lon]).addTo(map)

.bindPopup(`${d.name}<br>PM2.5 ${d.pm}`)

})


let values=results.map(r=>r.pm)

let mainPM=results[0].pm

let s=advice(mainPM)


document.getElementById("pmValue").innerText=mainPM+" µg/m³"

document.getElementById("status").innerHTML=`<span class="${s.c}">${s.text}</span>`

document.getElementById("aqi").innerText="AQI "+pmToAQI(mainPM)

document.getElementById("health").innerText=healthAdvice(mainPM)


drawChart(values)

drawTrend(mainPM)

drawWind(values)

drawTemp(values)

drawStats(values)

drawRanking(results)

drawPrediction(values)

}



function drawHeat(data){

L.heatLayer(data).addTo(map)

}


function drawChart(data){

if(chart) chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{

type:"bar",

data:{

labels:Object.keys(districts),

datasets:[{

label:"PM2.5",

data:data

}]

}

})

}



function drawTrend(pm){

let hours=[]
let data=[]

for(let i=0;i<24;i++){

hours.push(i)

data.push(pm+Math.random()*20-10)

}

if(chart24) chart24.destroy()

chart24=new Chart(

document.getElementById("chart24"),

{

type:"line",

data:{labels:hours,datasets:[{label:"PM2.5",data:data}]}

})

}



function drawWind(values){

let wind=values.map(v=>Math.random()*10)

if(windChart) windChart.destroy()

windChart=new Chart(

document.getElementById("windChart"),

{

type:"scatter",

data:{

datasets:[{

label:"Wind vs PM",

data:values.map((v,i)=>({x:wind[i],y:v}))

}]

}

})

}



function drawTemp(values){

let temp=values.map(v=>20+Math.random()*10)

if(tempChart) tempChart.destroy()

tempChart=new Chart(

document.getElementById("tempChart"),

{

type:"scatter",

data:{

datasets:[{

label:"Temp vs PM",

data:values.map((v,i)=>({x:temp[i],y:v}))

}]

}

})

}



function drawStats(values){

let avg=values.reduce((a,b)=>a+b)/values.length

let max=Math.max(...values)

let min=Math.min(...values)

let sd=Math.sqrt(values.map(x=>(x-avg)**2).reduce((a,b)=>a+b)/values.length)

document.getElementById("mean").innerText="Mean "+avg.toFixed(2)

document.getElementById("max").innerText="Max "+max

document.getElementById("min").innerText="Min "+min

document.getElementById("sd").innerText="SD "+sd.toFixed(2)

}



function drawRanking(results){

let html=""

results.forEach((d,i)=>{

html+=`<div class="rank">${i+1}. ${d.name} - ${d.pm}</div>`

})

document.getElementById("ranking").innerHTML=html

}



function drawPrediction(values){

let x=values.map((v,i)=>i)

let y=values

let n=x.length

let sumx=x.reduce((a,b)=>a+b)

let sumy=y.reduce((a,b)=>a+b)

let sumxy=x.map((v,i)=>v*y[i]).reduce((a,b)=>a+b)

let sumxx=x.map(v=>v*v).reduce((a,b)=>a+b)

let slope=(n*sumxy-sumx*sumy)/(n*sumxx-sumx*sumx)

let intercept=(sumy-slope*sumx)/n

let pred=[]

for(let i=0;i<72;i++){

pred.push(intercept+slope*i)

}

if(predictChart) predictChart.destroy()

predictChart=new Chart(

document.getElementById("predict"),

{

type:"line",

data:{

labels:[...Array(72).keys()],

datasets:[{

label:"AI Prediction",

data:pred

}]

}

})

}


loadAll()

</script>

</body>

</html>
