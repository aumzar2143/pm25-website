<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Smart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#e8f4ff;
transition:1s;
text-align:center;
}

header{
font-size:30px;
font-weight:bold;
padding:15px;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#map{
height:400px;
margin:10px;
border-radius:15px;
}

.pm{
font-size:60px;
font-weight:bold;
}

#advice{
font-size:18px;
margin-top:10px;
}

.cloud{
position:fixed;
top:50px;
font-size:50px;
animation:cloudmove 60s linear infinite;
opacity:0.6;
}

@keyframes cloudmove{
0%{left:-200px}
100%{left:110%}
}

#fog{
position:fixed;
bottom:0;
width:100%;
height:200px;
background:rgba(200,200,200,0.3);
pointer-events:none;
animation:fogmove 20s linear infinite;
}

@keyframes fogmove{
0%{transform:translateX(-50px)}
50%{transform:translateX(50px)}
100%{transform:translateX(-50px)}
}

.alert{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:15px 30px;
font-size:22px;
border-radius:10px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div class="cloud">☁</div>
<div class="cloud" style="top:120px; animation-duration:90s;">☁</div>

<div id="fog"></div>

<div class="alert" id="alert">🚨 ค่าฝุ่นเกินมาตรฐาน!</div>

<header>🌫 PM2.5 Lampang Smart Dashboard</header>

<div class="card">
ค่าฝุ่นปัจจุบัน
<div class="pm" id="pm">กำลังโหลด...</div>
<div id="status"></div>
<div id="advice"></div>
</div>

<div class="card">
📈 กราฟค่าฝุ่น
<canvas id="chart"></canvas>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([18.29,99.49],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let circle

async function loadPM(){

const url="https://api.waqi.info/feed/geo:18.29;99.49/?token=demo"

const res=await fetch(url)
const data=await res.json()

const pm=data.data.iaqi.pm25.v

document.getElementById("pm").innerHTML=pm+" µg/m³"

let status=""
let advice=""
let color="green"

if(pm<=25){
status="ดี"
advice="คุณภาพอากาศดี สามารถทำกิจกรรมกลางแจ้งได้ตามปกติ"
color="green"
document.body.style.background="#b9f6ca"
}

else if(pm<=50){
status="ปานกลาง"
advice="ผู้ที่มีโรคทางเดินหายใจควรสวมหน้ากากเมื่อออกนอกอาคาร"
color="yellow"
document.body.style.background="#fff59d"
}

else if(pm<=100){
status="เริ่มมีผลกระทบ"
advice="ควรลดกิจกรรมกลางแจ้ง และสวมหน้ากาก N95"
color="orange"
document.body.style.background="#ffcc80"
}

else if(pm<=150){
status="มีผลกระทบต่อสุขภาพ"
advice="หลีกเลี่ยงกิจกรรมกลางแจ้ง ใช้เครื่องฟอกอากาศ"
color="red"
document.body.style.background="#ef9a9a"
document.getElementById("alert").style.display="block"
}

else{
status="อันตราย"
advice="ควรอยู่ภายในอาคาร ปิดหน้าต่าง และสวมหน้ากาก N95"
color="purple"
document.body.style.background="#ce93d8"
document.getElementById("alert").style.display="block"
}

document.getElementById("status").innerHTML="สถานะ: "+status
document.getElementById("advice").innerHTML=advice

if(circle) map.removeLayer(circle)

circle=L.circle([18.29,99.49],{
color:color,
fillColor:color,
fillOpacity:0.5,
radius:10000
}).addTo(map)

}

loadPM()

setInterval(loadPM,300000)

const ctx=document.getElementById("chart")

new Chart(ctx,{
type:"line",
data:{
labels:["1ชม","2ชม","3ชม","4ชม","5ชม","6ชม"],
datasets:[{
label:"PM2.5",
data:[20,35,40,50,60,45],
fill:true
}]
}
})

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude
const lon=pos.coords.longitude

L.marker([lat,lon]).addTo(map)
.bindPopup("ตำแหน่งของคุณ")
.openPopup()

map.setView([lat,lon],12)

})

</script>

</body>
</html>
