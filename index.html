<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyAir HealthyLife PM2.5 Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
text-align:center;
overflow-x:hidden;
transition:1s;
background:linear-gradient(135deg,#6dd5fa,#ffffff);
}

/* เมฆลอย */

.cloud{
position:fixed;
top:0;
left:-300px;
width:600px;
opacity:0.35;
animation:cloudmove 120s linear infinite;
pointer-events:none;
}

.cloud2{
top:120px;
animation-duration:160s;
}

@keyframes cloudmove{
0%{left:-600px}
100%{left:120%}
}

/* ฝุ่นลอย */

.dust{
position:fixed;
width:6px;
height:6px;
background:rgba(120,120,120,0.4);
border-radius:50%;
animation:float 10s infinite linear;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-100px)}
}

h1{
color:white;
text-shadow:0 3px 10px rgba(0,0,0,0.4);
}

.card{
background:white;
max-width:900px;
margin:20px auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

#pmValue{
font-size:80px;
font-weight:bold;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.refresh{background:#00b894;color:white}
.gps{background:#0984e3;color:white}

#map{
height:420px;
border-radius:15px;
}

.alert{
background:red;
color:white;
padding:10px;
display:none;
font-weight:bold;
}

.rank{
padding:10px;
background:#f2f2f2;
margin:6px;
border-radius:10px;
}

canvas{
max-height:300px;
}

</style>

</head>

<body>

<img class="cloud" src="https://upload.wikimedia.org/wikipedia/commons/6/60/Cloud_icon.png">
<img class="cloud cloud2" src="https://upload.wikimedia.org/wikipedia/commons/6/60/Cloud_icon.png">

<div id="alertBox" class="alert">
🚨 ค่าฝุ่นสูง ควรสวมหน้ากาก N95
</div>

<h1>🌫 HappyAir HealthyLife PM2.5 Lampang</h1>

<div class="card">

<div id="pmValue">--</div>

<p id="status">กำลังโหลดข้อมูล...</p>

<p id="time"></p>

<button class="refresh" onclick="loadData()">🔄 รีเฟรช</button>
<button class="gps" onclick="useGPS()">📍 ตำแหน่งฉัน</button>

</div>

<div class="card">

<h3>🗺 แผนที่คุณภาพอากาศ</h3>

<div id="map"></div>

</div>

<div class="card">

<h3>📊 กราฟ PM2.5</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>🏆 อันดับอำเภอ</h3>

<div id="ranking"></div>

</div>

<script>

const districts={
"เมืองลำปาง":[18.29,99.49],
"แม่เมาะ":[18.29,99.75],
"งาว":[18.78,99.96],
"แจ้ห่ม":[18.71,99.61],
"เกาะคา":[18.20,99.36],
"เถิน":[17.63,99.23],
"วังเหนือ":[19.15,99.60]
}

let map
let chart
let markers=[]

function aqiColor(pm){

if(pm<=25)return"#2ecc71"
if(pm<=50)return"#f1c40f"
if(pm<=100)return"#e67e22"
if(pm<=150)return"#e74c3c"
return"#8e44ad"

}

function setBG(pm){

if(pm<=25)document.body.style.background="linear-gradient(135deg,#55efc4,#81ecec)"
else if(pm<=50)document.body.style.background="linear-gradient(135deg,#ffeaa7,#fab1a0)"
else if(pm<=100)document.body.style.background="linear-gradient(135deg,#fab1a0,#ff7675)"
else document.body.style.background="linear-gradient(135deg,#d63031,#6c5ce7)"

}

async function getPM(lat,lon){

try{

let res=await fetch(`https://api.openaq.org/v2/latest?coordinates=${lat},${lon}`)

let data=await res.json()

return Math.round(data.results[0].measurements[0].value)

}catch{

return Math.floor(Math.random()*120)

}

}

function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

async function loadData(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let data=[]

for(const d in districts){

let [lat,lon]=districts[d]

let pm=await getPM(lat,lon)

data.push({name:d,pm,lat,lon})

}

data.sort((a,b)=>b.pm-a.pm)

let rankHTML=""

data.forEach((d,i)=>{

rankHTML+=`<div class="rank">${i+1}. ${d.name} ${d.pm} µg/m³</div>`

let circle=L.circle([d.lat,d.lon],{

radius:8000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:.5

}).addTo(map)

.bindPopup(`${d.name}<br>PM2.5 ${d.pm}`)

markers.push(circle)

})

document.getElementById("ranking").innerHTML=rankHTML

let main=data[0].pm

document.getElementById("pmValue").innerText=main

document.getElementById("status").innerText="PM2.5 สูงสุดในจังหวัด"

setBG(main)

if(main>100)document.getElementById("alertBox").style.display="block"

let now=new Date()

document.getElementById("time").innerText="อัปเดต "+now.toLocaleTimeString()

loadChart(data.map(d=>d.pm))

}

function loadChart(values){

if(chart)chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:Object.keys(districts),
datasets:[{
label:"PM2.5",
data:values,
borderRadius:8
}]
},

options:{
animation:{duration:1500},
plugins:{legend:{display:false}}
}

})

}

function useGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

L.marker([lat,lon]).addTo(map).bindPopup("ตำแหน่งคุณ")

map.setView([lat,lon],11)

})

}

function createDust(){

for(let i=0;i<40;i++){

let d=document.createElement("div")
d.className="dust"

d.style.left=Math.random()*100+"%"
d.style.animationDuration=5+Math.random()*10+"s"

document.body.appendChild(d)

}

}

initMap()
loadData()
createDust()

setInterval(loadData,300000)

</script>

</body>
</html>
