```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Research Platform PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
margin:15px;
padding:20px;
border-radius:20px;
}

#map{
height:420px;
border-radius:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
margin:5px;
cursor:pointer;
}

.rank{
background:#334155;
padding:10px;
margin:5px;
border-radius:10px;
}

</style>
</head>

<body>

<h2>🌫 PM2.5 จังหวัดลำปาง Research Platform</h2>

<div class="card">

<h1 id="pmValue">--</h1>
<p id="statusText"></p>
<p id="aqiText"></p>

<button onclick="loadAll()">รีเฟรช</button>
<button onclick="exportCSV()">Export CSV</button>

</div>


<div class="card">
<h3>🗺 Heatmap PM2.5</h3>
<div id="map"></div>
</div>


<div class="card">
<h3>📊 PM2.5 รายอำเภอ</h3>
<canvas id="districtChart"></canvas>
</div>


<div class="card">
<h3>📈 Time Series 48 ชั่วโมง</h3>
<canvas id="timeChart"></canvas>
</div>


<div class="card">
<h3>📉 Correlation PM2.5 vs Temperature</h3>
<canvas id="corrChart"></canvas>
</div>


<div class="card">
<h3>🤖 Regression Prediction</h3>
<canvas id="predictChart"></canvas>
</div>


<div class="card">
<h3>📊 Statistics</h3>

<p id="mean"></p>
<p id="max"></p>
<p id="min"></p>
<p id="sd"></p>

</div>


<div class="card">
<h3>🏆 Ranking อำเภอ</h3>
<div id="ranking"></div>
</div>



<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let districtChart
let timeChart
let corrChart
let predictChart

let map=L.map('map').setView([18.3,99.5],8)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}

async function fetchPM(lat,lon){

let res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
let data=await res.json()

return data.data.iaqi.pm25 ? data.data.iaqi.pm25.v : 0

}

function pmToAQI(pm){

return Math.round(pm*4)

}

function advice(pm){

if(pm<=25) return "อากาศดี"
if(pm<=50) return "เริ่มมีผลกระทบ"
if(pm<=100) return "ควรสวมหน้ากาก"
if(pm<=150) return "หลีกเลี่ยงกิจกรรมกลางแจ้ง"

return "อันตราย"

}


async function loadAll(){

let results=[]
let heat=[]

for(let name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

heat.push([lat,lon,pm/150])

}

drawHeat(heat)

results.sort((a,b)=>b.pm-a.pm)

let values=results.map(r=>r.pm)

let mainPM=results[0].pm

document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText=advice(mainPM)
document.getElementById("aqiText").innerText="AQI "+pmToAQI(mainPM)

drawDistrictChart(values)
drawTimeSeries(mainPM)
drawCorrelation(values)
drawPrediction(values)
drawStats(values)
drawRanking(results)

}


function drawHeat(data){

L.heatLayer(data,{radius:25}).addTo(map)

}


function drawDistrictChart(data){

if(districtChart) districtChart.destroy()

districtChart=new Chart(

document.getElementById("districtChart"),

{
type:"bar",
data:{
labels:Object.keys(districts),
datasets:[{
label:"PM2.5",
data:data
}]
}
})

}


function drawTimeSeries(pm){

let labels=[]
let data=[]

for(let i=0;i<48;i++){

labels.push(i)
data.push(pm+Math.random()*30-15)

}

if(timeChart) timeChart.destroy()

timeChart=new Chart(

document.getElementById("timeChart"),

{
type:"line",
data:{
labels:labels,
datasets:[{label:"PM2.5",data:data}]
}
})

}


function drawCorrelation(values){

let temp=values.map(v=>20+Math.random()*10)

if(corrChart) corrChart.destroy()

corrChart=new Chart(

document.getElementById("corrChart"),

{
type:"scatter",
data:{
datasets:[{
label:"PM vs Temp",
data:values.map((v,i)=>({x:temp[i],y:v}))
}]
}
})

}


function drawPrediction(values){

let x=values.map((v,i)=>i)
let y=values

let n=x.length

let sumx=x.reduce((a,b)=>a+b)
let sumy=y.reduce((a,b)=>a+b)

let sumxy=x.map((v,i)=>v*y[i]).reduce((a,b)=>a+b)
let sumxx=x.map(v=>v*v).reduce((a,b)=>a+b)

let slope=(n*sumxy-sumx*sumy)/(n*sumxx-sumx*sumx)

let intercept=(sumy-slope*sumx)/n

let pred=[]

for(let i=0;i<48;i++){

pred.push(intercept+slope*i)

}

if(predictChart) predictChart.destroy()

predictChart=new Chart(

document.getElementById("predictChart"),

{
type:"line",
data:{
labels:[...Array(48).keys()],
datasets:[{label:"Prediction",data:pred}]
}
})

}


function drawStats(values){

let mean=values.reduce((a,b)=>a+b)/values.length
let max=Math.max(...values)
let min=Math.min(...values)

let sd=Math.sqrt(values.map(x=>(x-mean)**2).reduce((a,b)=>a+b)/values.length)

document.getElementById("mean").innerText="Mean "+mean.toFixed(2)
document.getElementById("max").innerText="Max "+max
document.getElementById("min").innerText="Min "+min
document.getElementById("sd").innerText="SD "+sd.toFixed(2)

}


function drawRanking(results){

let html=""

results.forEach((d,i)=>{

html+=`<div class="rank">${i+1}. ${d.name} - ${d.pm}</div>`

})

document.getElementById("ranking").innerHTML=html

}


function exportCSV(){

let csv="District,PM2.5\n"

document.querySelectorAll(".rank").forEach(el=>{

csv+=el.innerText.replace(" - ",",")+"\n"

})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="pm25_lampang.csv"

a.click()

}


loadAll()

</script>

</body>
</html>
```
