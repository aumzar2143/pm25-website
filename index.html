<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Smart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
margin:0;
text-align:center;
transition:0.6s;
}

header{
background:white;
padding:20px;
font-size:26px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

#pmValue{
font-size:60px;
font-weight:bold;
}

#status{
font-size:24px;
margin-top:10px;
}

#advice{
text-align:left;
line-height:1.8;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#388E3C;
}

#map{
height:400px;
border-radius:15px;
margin-top:10px;
}

.alert{
background:#ff5252;
color:white;
padding:15px;
border-radius:15px;
font-size:20px;
display:none;
margin-bottom:10px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}

</style>
</head>

<body>

<header>🌫 PM2.5 Smart Dashboard</header>

<div class="card">

<button onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

<p id="locationText">ยังไม่ได้รับตำแหน่ง</p>

</div>

<div class="card">

<div class="alert" id="alertBox">
🚨 ค่าฝุ่นเกินมาตรฐาน ระวังสุขภาพ
</div>

<div id="pmValue">--</div>
<div id="status">กำลังโหลด</div>

</div>

<div class="card">

<h3>📋 คำแนะนำสุขภาพ</h3>

<div id="advice"></div>

</div>

<div class="card">

<h3>📊 กราฟ PM2.5</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>🗺 แผนที่ฝุ่น</h3>

<div id="map"></div>

</div>

<script>

let map=L.map('map').setView([18.29,99.49],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
}).addTo(map)

let circle

async function useGPS(){

navigator.geolocation.getCurrentPosition(async pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

getAddress(lat,lon)

getPM(lat,lon)

})

}

async function getAddress(lat,lon){

let res=await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
)

let data=await res.json()

let a=data.address

document.getElementById("locationText").innerHTML=`
🏠 บ้าน : ${a.house_number||"-"}<br>
📍 ตำบล : ${a.suburb||a.village||"-"}<br>
🏙 อำเภอ : ${a.county||"-"}<br>
🌏 จังหวัด : ${a.state||"-"}
`

}

async function getPM(lat,lon){

let res=await fetch(
`https://api.waqi.info/feed/geo:${lat};${lon}/?token=demo`
)

let data=await res.json()

let pm=data.data.iaqi.pm25.v

document.getElementById("pmValue").innerText=pm

let status=""
let advice=""
let color=""

if(pm<=25){
status="ดี"
color="#4CAF50"
advice=`
😊 อากาศดีมาก<br>
• สามารถทำกิจกรรมกลางแจ้งได้<br>
• เปิดหน้าต่างระบายอากาศได้
`
}

else if(pm<=50){
status="ปานกลาง"
color="#FFC107"
advice=`
🙂 อากาศเริ่มมีฝุ่น<br>
• คนทั่วไปยังทำกิจกรรมได้<br>
• ผู้ป่วยควรระวัง
`
}

else if(pm<=100){
status="เริ่มมีผลต่อสุขภาพ"
color="#FF9800"
advice=`
😷 ควรเริ่มป้องกัน<br>
• สวมหน้ากาก<br>
• ลดกิจกรรมกลางแจ้ง
`
}

else{
status="อันตราย"
color="#F44336"

document.getElementById("alertBox").style.display="block"

advice=`
🚨 ฝุ่นอันตรายมาก<br>
• งดกิจกรรมกลางแจ้ง<br>
• สวมหน้ากาก N95<br>
• ใช้เครื่องฟอกอากาศ
`
}

document.getElementById("status").innerText=status
document.getElementById("advice").innerHTML=advice

document.body.style.background=color+"33"

drawCircle(lat,lon,pm,color)

drawChart(pm)

}

function drawCircle(lat,lon,pm,color){

if(circle)map.removeLayer(circle)

circle=L.circle([lat,lon],{
radius:4000,
color:color,
fillColor:color,
fillOpacity:0.5
}).addTo(map)

map.setView([lat,lon],11)

}

function drawChart(pm){

new Chart(
document.getElementById('chart'),
{
type:'line',
data:{
labels:["ตอนนี้"],
datasets:[{
label:"PM2.5",
data:[pm]
}]
}
}
)

}

</script>

</body>
</html>
