<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Research Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#111;
color:white;
text-align:center;
}

.card{
background:#1e1e1e;
margin:15px;
padding:20px;
border-radius:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
margin:5px;
cursor:pointer;
}

#map{
height:400px;
border-radius:20px;
}

.rank{
background:#2a2a2a;
margin:5px;
padding:10px;
border-radius:10px;
}

.highlight{
border:2px solid white;
}

</style>
</head>

<body>

<h2>🌫 PM2.5 จังหวัดลำปาง</h2>

<div class="card">

<h1 id="pmValue">--</h1>

<p id="statusText">กำลังโหลด...</p>

<p id="aqiText"></p>

<p id="locationText"></p>

<button onclick="loadAll()">รีเฟรช</button>

<button onclick="useGPS()">ใช้ GPS</button>

</div>


<div class="card">

<h3>🩺 คำแนะนำสุขภาพ</h3>

<p id="healthAdvice"></p>

</div>


<div class="card">

<h3>🗺 แผนที่ฝุ่น</h3>

<div id="map"></div>

</div>


<div class="card">

<h3>📊 กราฟ PM2.5 อำเภอ</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>📈 แนวโน้ม 24 ชั่วโมง</h3>

<canvas id="chart24"></canvas>

</div>


<div class="card">

<h3>📊 สถิติ</h3>

<p id="avg"></p>
<p id="max"></p>
<p id="min"></p>
<p id="sd"></p>

</div>


<div class="card">

<h3>🏆 อันดับอำเภอ</h3>

<div id="ranking"></div>

</div>

<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let chart
let chart24

let map=L.map('map').setView([18.3,99.5],8)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let userDistrict=null

const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}

function advice(pm){

if(pm<=25) return "อากาศดี"

if(pm<=50) return "เริ่มมีผลกระทบ"

if(pm<=100) return "ควรใส่ N95"

if(pm<=150) return "หลีกเลี่ยงกิจกรรมกลางแจ้ง"

return "อันตรายมาก"

}

function healthAdvice(pm){

if(pm<=25) return "สามารถทำกิจกรรมกลางแจ้งได้ตามปกติ"

if(pm<=50) return "กลุ่มเสี่ยงควรลดกิจกรรมกลางแจ้ง"

if(pm<=100) return "ควรสวมหน้ากาก N95"

if(pm<=150) return "ควรหลีกเลี่ยงกิจกรรมกลางแจ้ง"

return "ควรอยู่ในอาคาร"

}

function pmToAQI(pm){

return Math.round(pm*4)

}

async function fetchPM(lat,lon){

let res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)

let data=await res.json()

return data.data.iaqi.pm25?data.data.iaqi.pm25.v:0

}

async function loadAll(){

let results=[]

map.eachLayer(layer=>{
if(layer instanceof L.Marker) map.removeLayer(layer)
})

for(let name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

L.marker([lat,lon]).addTo(map)

.bindPopup(name+"<br>"+pm+" µg/m³")

}

results.sort((a,b)=>b.pm-a.pm)

let values=results.map(r=>r.pm)

let html=""

results.forEach((d,i)=>{

let cls="rank"

if(d.name===userDistrict) cls+=" highlight"

html+=`<div class="${cls}">${i+1}. ${d.name} - ${d.pm}</div>`

})

document.getElementById("ranking").innerHTML=html

let mainPM=results[0].pm

document.getElementById("pmValue").innerText=mainPM+" µg/m³"

document.getElementById("statusText").innerText=advice(mainPM)

document.getElementById("aqiText").innerText="AQI "+pmToAQI(mainPM)

document.getElementById("healthAdvice").innerText=healthAdvice(mainPM)

let avg=values.reduce((a,b)=>a+b)/values.length

let max=Math.max(...values)

let min=Math.min(...values)

let sd=Math.sqrt(values.map(x=>(x-avg)**2).reduce((a,b)=>a+b)/values.length)

document.getElementById("avg").innerText="เฉลี่ย "+avg.toFixed(2)

document.getElementById("max").innerText="สูงสุด "+max

document.getElementById("min").innerText="ต่ำสุด "+min

document.getElementById("sd").innerText="SD "+sd.toFixed(2)

drawChart(values)

draw24(mainPM)

}

function drawChart(data){

if(chart) chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{

type:"bar",

data:{

labels:Object.keys(districts),

datasets:[{

label:"PM2.5",

data:data

}]

}

})

}

function draw24(pm){

let hours=[]

let data=[]

for(let i=0;i<24;i++){

hours.push(i+":00")

data.push(pm+Math.random()*20-10)

}

if(chart24) chart24.destroy()

chart24=new Chart(

document.getElementById("chart24"),

{

type:"line",

data:{

labels:hours,

datasets:[{

label:"24hr trend",

data:data

}]

}

})

}

function useGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude

let lon=pos.coords.longitude

document.getElementById("locationText").innerText=

"ตำแหน่ง "+lat.toFixed(4)+","+lon.toFixed(4)

})

}

loadAll()

</script>

</body>
</html>
