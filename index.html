<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyAir HealthyLife PM2.5 - Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
transition:background 1s;
background:linear-gradient(135deg,#74b9ff,#dfe6e9);
}

h2{
color:white;
margin-top:20px;
text-shadow:0 2px 5px rgba(0,0,0,0.3);
}

.card{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
margin:20px auto;
padding:25px;
border-radius:20px;
max-width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

#pmValue{
font-size:80px;
font-weight:bold;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
margin:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.refresh{background:#00b894;color:white;}
.gps{background:#0984e3;color:white;}
.export{background:#fdcb6e;}

.rank{
background:#f1f5f9;
padding:12px;
margin:6px;
border-radius:10px;
font-weight:500;
}

.highlight{
border:2px solid #0984e3;
background:#eaf4ff;
}

#map{
height:420px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.legend{
text-align:left;
max-width:420px;
margin:auto;
font-size:15px;
}

.legend div{
margin:6px;
}

canvas{
max-height:320px;
}

.loading{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

</style>
</head>

<body>

<h2>🌫 PM2.5 Smart Health Monitoring - Lampang</h2>

<div class="card">

<div id="pmValue" class="loading">--</div>

<p id="statusText">กำลังโหลดข้อมูล...</p>

<p id="locationText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>

<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

</div>


<div class="card">

<h3>🩺 คำแนะนำสุขภาพ</h3>

<p id="healthAdvice"></p>

</div>


<div class="card">

<h3>🗺 แผนที่คุณภาพอากาศ</h3>

<div id="map"></div>

<div class="legend">

<b>ระดับคุณภาพอากาศ</b>

<div>🟢 0-25 อากาศดี</div>
<div>🟡 26-50 ปานกลาง</div>
<div>🟠 51-100 เริ่มมีผลกระทบ</div>
<div>🔴 101-150 มีผลต่อสุขภาพ</div>
<div>🟣 151+ อันตรายมาก</div>

</div>

</div>


<div class="card">

<h3>📊 กราฟ PM2.5</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>🏆 อันดับอำเภอ</h3>

<div id="ranking"></div>

</div>


<div class="card">

<button class="export" onclick="exportCSV()">📥 Export CSV</button>

</div>



<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let map
let chart
let markers=[]
let userMarker=null
let userDistrict=null

const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}

function aqiColor(pm){

if(pm<=25)return"#2ecc71"
if(pm<=50)return"#f1c40f"
if(pm<=100)return"#e67e22"
if(pm<=150)return"#e74c3c"
return"#8e44ad"

}

function setBackground(pm){

let bg=""

if(pm<=25)bg="linear-gradient(135deg,#2ecc71,#a8e6cf)"
else if(pm<=50)bg="linear-gradient(135deg,#f1c40f,#ffeaa7)"
else if(pm<=100)bg="linear-gradient(135deg,#e67e22,#fab1a0)"
else if(pm<=150)bg="linear-gradient(135deg,#e74c3c,#ff7675)"
else bg="linear-gradient(135deg,#8e44ad,#c39bd3)"

document.body.style.background=bg

}

function levelText(pm){

if(pm<=25)return"อากาศดี"
if(pm<=50)return"ปานกลาง"
if(pm<=100)return"เริ่มมีผลกระทบ"
if(pm<=150)return"มีผลกระทบต่อสุขภาพ"
return"อันตรายมาก"

}

function healthAdvice(pm){

if(pm<=25)return"อากาศดี สามารถทำกิจกรรมกลางแจ้งได้ตามปกติ เหมาะสำหรับการออกกำลังกาย"

if(pm<=50)return"อากาศปานกลาง คนทั่วไปทำกิจกรรมกลางแจ้งได้ แต่ผู้แพ้ฝุ่นควรระวัง"

if(pm<=100)return"เริ่มมีผลกระทบ ควรใส่หน้ากาก N95 ลดกิจกรรมกลางแจ้ง"

if(pm<=150)return"มีผลกระทบต่อสุขภาพ หลีกเลี่ยงกิจกรรมกลางแจ้ง"

return"อันตรายมาก ควรอยู่ในอาคาร และสวมหน้ากาก N95"

}

async function fetchPM(lat,lon){

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
const data=await res.json()

return data.data.iaqi.pm25?data.data.iaqi.pm25.v:0

}

function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

async function loadAll(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

}

results.sort((a,b)=>b.pm-a.pm)

let rankingHTML=""

results.forEach((d,i)=>{

let cls="rank"
if(d.name===userDistrict)cls+=" highlight"

rankingHTML+=`<div class="${cls}">${i+1}. ${d.name} - ${d.pm} µg/m³</div>`

let circle=L.circle([d.lat,d.lon],{

radius:7000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.6

}).addTo(map)

.bindPopup(`<b>${d.name}</b><br>PM2.5 ${d.pm}<br>${levelText(d.pm)}`)

markers.push(circle)

})

document.getElementById("ranking").innerHTML=rankingHTML

let mainPM=results[0].pm

document.getElementById("pmValue").classList.remove("loading")
document.getElementById("pmValue").innerText=mainPM+" µg/m³"

document.getElementById("statusText").innerText="ระดับอากาศ: "+levelText(mainPM)

document.getElementById("healthAdvice").innerText=healthAdvice(mainPM)

setBackground(mainPM)

loadChart(results.map(r=>r.pm))

}

function loadChart(data){

if(chart)chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{
type:"bar",
data:{
labels:Object.keys(districts),
datasets:[{
label:"PM2.5",
data:data
}]
}

}

)

}

function useGPS(){

navigator.geolocation.getCurrentPosition(

pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("locationText").innerText=
"📍 ตำแหน่งปัจจุบัน: "+lat.toFixed(4)+","+lon.toFixed(4)

if(userMarker)map.removeLayer(userMarker)

userMarker=L.marker([lat,lon]).addTo(map)
.bindPopup("ตำแหน่งของคุณ")
.openPopup()

map.setView([lat,lon],11)

userDistrict=findClosest(lat,lon)

loadAll()

}

)

}

function findClosest(lat,lon){

let min=999
let closest=null

for(const name in districts){

let [dlat,dlon]=districts[name]

let dist=Math.hypot(lat-dlat,dlon-lon)

if(dist<min){

min=dist
closest=name

}

}

return closest

}

function exportCSV(){

let csv="District,PM2.5\n"

document.querySelectorAll(".rank").forEach(el=>{

csv+=el.innerText+"\n"

})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="pm25_lampang.csv"

a.click()

}

initMap()
loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
