<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyAir HealthyLife PM2.5 - Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0984e3">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
transition:background 1s;
background:linear-gradient(135deg,#74b9ff,#dfe6e9);
}

h2{
color:white;
margin-top:20px;
text-shadow:0 2px 5px rgba(0,0,0,0.3);
}

.card{
background:rgba(255,255,255,0.9);
margin:20px auto;
padding:25px;
border-radius:20px;
max-width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

#pmValue{
font-size:80px;
font-weight:bold;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
margin:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.refresh{background:#00b894;color:white;}
.gps{background:#0984e3;color:white;}
.test{background:#e17055;color:white;}

.rank{
background:#f1f5f9;
padding:12px;
margin:6px;
border-radius:10px;
}

.highlight{
border:3px solid #0984e3;
background:#eaf4ff;
}

#map{
height:420px;
border-radius:15px;
}

canvas{
max-height:320px;
}

.alert{
background:#ff4d4d;
color:white;
padding:10px;
display:none;
font-weight:bold;
}

</style>
</head>

<body>

<div id="alertBox" class="alert">
🚨 ค่าฝุ่นเกินมาตรฐาน ควรสวมหน้ากาก N95
</div>

<h2>🌫 HappyAir HealthyLife PM2.5 - Lampang</h2>

<div class="card">

<div id="pmValue">--</div>

<p id="statusText">กำลังโหลดข้อมูล...</p>

<p id="locationText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>
<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>
<button class="test" onclick="testSound()">🔊 ทดสอบเสียง</button>

</div>

<div class="card">

<h3>🗺 แผนที่คุณภาพอากาศ</h3>
<div id="map"></div>

</div>

<div class="card">

<h3>📊 กราฟ PM2.5</h3>
<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>🏆 อันดับอำเภอ</h3>
<div id="ranking"></div>

</div>

<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let map
let chart
let markers=[]
let userDistrict=null

// ---------- เสียงเตือน ----------
let alarmSound=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

function testSound(){

alarmSound.play()

}

// ---------- LINE ALERT ----------
const lineToken="PUT_LINE_TOKEN"

function sendLine(pm){

fetch("https://notify-api.line.me/api/notify",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded",
"Authorization":"Bearer "+lineToken
},
body:"message=🚨 PM2.5 Lampang = "+pm+" µg/m³"
})

}

// ---------- Notification ----------
function sendNotification(pm){

if(Notification.permission==="granted"){

new Notification("🚨 PM2.5 สูง",{
body:"ค่าฝุ่น "+pm+" µg/m³",
icon:"https://cdn-icons-png.flaticon.com/512/481/481965.png"
})

}

alarmSound.play()

}

function requestNotify(){

if("Notification" in window){

Notification.requestPermission()

}

}

// ---------- districts ----------
const districts={
"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]
}

function aqiColor(pm){
if(pm<=25)return"#2ecc71"
if(pm<=50)return"#f1c40f"
if(pm<=100)return"#e67e22"
if(pm<=150)return"#e74c3c"
return"#8e44ad"
}

async function fetchPM(lat,lon){

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
const data=await res.json()

return data.data.iaqi.pm25 ? data.data.iaqi.pm25.v : 0

}

function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

async function loadAll(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

}

results.sort((a,b)=>b.pm-a.pm)

let rankingHTML=""
let labels=[]
let data=[]

results.forEach((d,i)=>{

labels.push(d.name)
data.push(d.pm)

rankingHTML+=`<div class="rank">${i+1}. ${d.name} - ${d.pm}</div>`

let circle=L.circle([d.lat,d.lon],{
radius:7000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.6
}).addTo(map)

markers.push(circle)

})

document.getElementById("ranking").innerHTML=rankingHTML

let mainPM=results[0].pm

document.getElementById("pmValue").innerText=mainPM+" µg/m³"

if(mainPM>100){

document.getElementById("alertBox").style.display="block"

sendNotification(mainPM)

sendLine(mainPM)

}

loadChart(labels,data)

}

function loadChart(labels,data){

if(chart)chart.destroy()

chart=new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"PM2.5",
data:data,
backgroundColor:"#0984e3"
}]
}
}
)

}

function useGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

L.marker([lat,lon]).addTo(map)

map.setView([lat,lon],12)

})

}

// ---------- PWA ----------
if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

initMap()

requestNotify()

loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
