<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Advanced Research Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

#map{
height:500px;
border-radius:10px;
}

.rank{
padding:10px;
margin:5px;
background:#0f172a;
border-radius:8px;
}

.highlight{
border:2px solid white;
}

.sensorCircle{
stroke:white;
stroke-width:1;
}

</style>
</head>

<body>

<div class="container">

<h1>🌫 PM2.5 จังหวัดลำปาง Advanced Dashboard</h1>

<div class="card">

<h2 id="pmValue">--</h2>
<p id="statusText"></p>

</div>

<div class="card">

<h3>🩺 คำแนะนำการป้องกันฝุ่น (ละเอียด)</h3>

<p id="healthAdvice"></p>

</div>

<div class="card">

<h3>🗺 Realtime Sensor Network Map</h3>

<div id="map"></div>

</div>

<div class="grid">

<div class="card">

<h3>📈 PM2.5 District Trend</h3>

<canvas id="lineChart"></canvas>

</div>

<div class="card">

<h3>📊 District Comparison</h3>

<canvas id="barChart"></canvas>

</div>

</div>

<div class="card">

<h3>🏆 District Ranking</h3>

<div id="ranking"></div>

</div>

</div>


<script>

const air4thai="https://air4thai.pcd.go.th/services/getNewAQI_JSON.php"

let map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let sensorLayer=[]
let windLayer

function getColor(pm){

if(pm<=25) return "#00e400"
if(pm<=50) return "#ffff00"
if(pm<=100) return "#ff7e00"
if(pm<=150) return "#ff0000"
return "#8f3f97"

}

function getRadius(pm){

return 6 + (pm/10)

}

function advice(pm){

if(pm<=25)
return "อากาศดี สามารถทำกิจกรรมกลางแจ้งได้"

if(pm<=50)
return "เริ่มมีผลกระทบต่อสุขภาพบางกลุ่ม"

if(pm<=100)
return "มีผลกระทบต่อสุขภาพ"

if(pm<=150)
return "เริ่มอันตรายต่อสุขภาพ"

return "อันตรายมาก"

}

function healthAdvice(pm){

return `

แนวทางป้องกันฝุ่น PM2.5

• สวมหน้ากาก N95 หรือ KN95 ทุกครั้งเมื่อออกนอกบ้าน

• หลีกเลี่ยงกิจกรรมกลางแจ้งเป็นเวลานาน

• ปิดประตูหน้าต่างบ้านเพื่อลดฝุ่น

• ใช้เครื่องฟอกอากาศ HEPA

• ดื่มน้ำมาก ๆ เพื่อลดการระคายเคืองทางเดินหายใจ

• ล้างจมูกด้วยน้ำเกลือ

• กลุ่มเสี่ยง (เด็ก ผู้สูงอายุ ผู้ป่วยโรคปอด หัวใจ) ควรอยู่ในอาคาร

• หลีกเลี่ยงการออกกำลังกายกลางแจ้ง

• ติดตามค่าฝุ่นจากสถานีวัดใกล้บ้าน

• หากมีอาการไอ หายใจลำบาก ควรพบแพทย์

• ใช้เครื่องวัดฝุ่นในบ้านเพื่อติดตามคุณภาพอากาศ

• ทำความสะอาดบ้านแบบเปียกเพื่อลดฝุ่น

`

}


async function loadSensors(){

let res=await fetch(air4thai)

let data=await res.json()

let stations=data.stations

let heat=[]

stations.forEach(st=>{

let lat=parseFloat(st.lat)
let lon=parseFloat(st.long)

let pm=parseFloat(st.PM25?.value||0)

let color=getColor(pm)

let radius=getRadius(pm)

let circle=L.circleMarker([lat,lon],{

radius:radius,

color:color,

fillColor:color,

fillOpacity:0.8,

className:"sensorCircle"

}).addTo(map)

.bindPopup(`

<b>${st.nameTH}</b>

<br>PM2.5: ${pm}

<br>AQI: ${st.AQI?.aqi}

`)

sensorLayer.push(circle)

})

}


async function loadWind(){

let res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=18.3&longitude=99.5&current_weather=true")

let data=await res.json()

let dir=data.current_weather.winddirection

let speed=data.current_weather.windspeed

let arrow=L.polyline(

[
[18.3,99.5],
[18.3 + Math.cos(dir*Math.PI/180)*0.5,
99.5 + Math.sin(dir*Math.PI/180)*0.5]
],

{color:"cyan",weight:4}

).addTo(map)

.bindPopup(`Wind ${dir}° Speed ${speed} km/h`)

}


async function loadAll(){

sensorLayer.forEach(s=>map.removeLayer(s))

sensorLayer=[]

await loadSensors()

await loadWind()

}

loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
