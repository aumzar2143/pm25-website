<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let map
let chart
let markers=[]
let userMarker=null

let alertSound=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

const districts={
"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]
}

function aqiColor(pm){
if(pm<=25)return"#2ecc71"
if(pm<=50)return"#f1c40f"
if(pm<=100)return"#e67e22"
if(pm<=150)return"#e74c3c"
return"#8e44ad"
}

function animatePM(value){

let start=0
let end=value
let duration=1000
let step=end/(duration/16)

let counter=setInterval(()=>{

start+=step

if(start>=end){
start=end
clearInterval(counter)
}

document.getElementById("pmValue").innerText=
Math.floor(start)+" µg/m³"

},16)

}

function healthAdvice(pm){

let html="<ul>"

if(pm<=25){
html+=`
<li>อากาศดี สามารถทำกิจกรรมกลางแจ้งได้</li>
<li>เหมาะสำหรับออกกำลังกาย</li>
<li>เด็กและผู้สูงอายุใช้ชีวิตได้ปกติ</li>`
}

else if(pm<=50){
html+=`
<li>ทำกิจกรรมกลางแจ้งได้</li>
<li>ผู้แพ้ฝุ่นควรระวัง</li>
<li>ดื่มน้ำมากขึ้น</li>`
}

else if(pm<=100){
html+=`
<li>ควรใส่หน้ากาก N95</li>
<li>ลดกิจกรรมกลางแจ้ง</li>
<li>ปิดหน้าต่างบ้าน</li>
<li>ใช้เครื่องฟอกอากาศ</li>`
}

else{
html+=`
<li>หลีกเลี่ยงกิจกรรมกลางแจ้ง</li>
<li>สวมหน้ากาก N95</li>
<li>อยู่ในอาคาร</li>
<li>ใช้เครื่องฟอกอากาศ</li>
<li>เด็ก ผู้สูงอายุ และผู้ป่วยโรคปอดควรระวัง</li>`
}

html+="</ul>"
return html
}

async function fetchPM(lat,lon){

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
const data=await res.json()

return data.data.iaqi.pm25 ? data.data.iaqi.pm25.v : 0

}

function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

async function loadAll(){

document.getElementById("loading").style.display="block"

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

}

results.sort((a,b)=>b.pm-a.pm)

let rankingHTML=""

results.forEach((d,i)=>{

rankingHTML+=`<div class="rank">${i+1}. ${d.name} - ${d.pm} µg/m³</div>`

let circle=L.circle([d.lat,d.lon],{

radius:3000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.5,
weight:2,
className:"sensor"

}).addTo(map)
.bindPopup(`<b>${d.name}</b><br>PM2.5 ${d.pm} µg/m³`)

markers.push(circle)

})

document.getElementById("ranking").innerHTML=rankingHTML

let mainPM=results[0].pm

animatePM(mainPM)

document.getElementById("statusText").innerText="ระดับอากาศ: "+mainPM

document.getElementById("healthAdvice").innerHTML=healthAdvice(mainPM)

if(mainPM>100){

document.getElementById("alertBox").style.display="block"

alertSound.play()

}else{

document.getElementById("alertBox").style.display="none"

}

loadChart(results.map(r=>r.pm))

document.getElementById("loading").style.display="none"

}

function loadChart(data){

if(chart)chart.destroy()

chart=new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:Object.keys(districts),
datasets:[{
label:"PM2.5",
data:data
}]
}
}
)

}

function useGPS(){

navigator.geolocation.getCurrentPosition(async pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

if(userMarker)map.removeLayer(userMarker)

userMarker=L.marker([lat,lon]).addTo(map)
.bindPopup("ตำแหน่งของคุณ")
.openPopup()

map.setView([lat,lon],11)

})

}

initMap()
loadAll()

setInterval(loadAll,300000)

</script>
