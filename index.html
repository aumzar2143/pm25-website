<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.refresh{background:#00c853;color:white}
.gps{background:#2962ff;color:white}

#map{
height:420px;
border-radius:10px;
}

.rank{
background:#0f172a;
margin:5px;
padding:10px;
border-radius:8px;
}

.highlight{
border:2px solid white;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="container">

<h1>🌫 PM2.5 จังหวัดลำปาง</h1>

<div class="card">

<h2 id="pmValue">--</h2>
<p id="statusText">กำลังโหลด...</p>

<button class="refresh" onclick="loadAll()">รีเฟรช</button>
<button class="gps" onclick="useGPS()">ใช้ GPS</button>

</div>

<div class="card">
<h3>🩺 คำแนะนำการป้องกันฝุ่น (กรมอนามัย)</h3>
<p id="healthAdvice"></p>
</div>

<div class="card">
<h3>🗺 แผนที่ฝุ่น PM2.5</h3>
<div id="map"></div>
</div>

<div class="grid">

<div class="card">
<h3>📈 แนวโน้ม PM2.5</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>📊 เปรียบเทียบอำเภอ</h3>
<canvas id="barChart"></canvas>
</div>

</div>

<div class="card">
<h3>🏆 อันดับอำเภอ</h3>
<div id="ranking"></div>
</div>

</div>


<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let map=L.map('map').setView([18.3,99.5],9)
let heatLayer
let lineChart
let barChart
let userDistrict=null
let userMarker=null

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)


const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}


function getColor(pm){

if(pm<=25) return "green"
if(pm<=50) return "yellow"
if(pm<=100) return "orange"
if(pm<=150) return "red"
return "purple"

}

function healthAdvice(pm){

if(pm<=25)
return "อากาศดี สามารถทำกิจกรรมกลางแจ้งได้"

if(pm<=50)
return "กลุ่มเสี่ยงควรสวมหน้ากาก"

if(pm<=100)
return "ควรสวมหน้ากาก N95 และลดกิจกรรมกลางแจ้ง"

if(pm<=150)
return "หลีกเลี่ยงกิจกรรมกลางแจ้งและปิดบ้าน"

return "อันตรายต่อสุขภาพ ควรอยู่ในอาคาร"

}


async function fetchPM(lat,lon){

let res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
let data=await res.json()

return data.data.iaqi.pm25?data.data.iaqi.pm25.v:0

}


function findClosest(lat,lon){

let min=999999
let closest=null

for(const name in districts){

let [dlat,dlon]=districts[name]

let dist=Math.hypot(lat-dlat,lon-dlon)

if(dist<min){
min=dist
closest=name
}

}

return closest

}


async function loadAll(){

let results=[]
let heatData=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

heatData.push([lat,lon,pm/150])

L.circleMarker([lat,lon],{
radius:8,
color:getColor(pm)
}).addTo(map).bindPopup(`${name}<br>PM2.5: ${pm}`)

}

results.sort((a,b)=>b.pm-a.pm)

let html=""

results.forEach((d,i)=>{

let cls="rank"

if(d.name===userDistrict)
cls+=" highlight"

html+=`<div class="${cls}">${i+1}. ${d.name} - ${d.pm} µg/m³</div>`

})

document.getElementById("ranking").innerHTML=html

let labels=results.map(r=>r.name)
let values=results.map(r=>r.pm)

let mainPM=results[0].pm

document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText="สถานะ: "+mainPM
document.getElementById("healthAdvice").innerText=healthAdvice(mainPM)

createCharts(labels,values)
createHeatmap(heatData)

}


function createCharts(labels,data){

if(lineChart) lineChart.destroy()
if(barChart) barChart.destroy()

lineChart=new Chart(
document.getElementById("lineChart"),
{
type:"line",
data:{labels:labels,datasets:[{label:"PM2.5",data:data}]}
}
)

barChart=new Chart(
document.getElementById("barChart"),
{
type:"bar",
data:{labels:labels,datasets:[{label:"PM2.5",data:data}]}
}
)

}


function createHeatmap(data){

if(heatLayer) map.removeLayer(heatLayer)

heatLayer=L.heatLayer(data,{
radius:35,
blur:25,
gradient:{
0.2:"green",
0.4:"yellow",
0.6:"orange",
0.8:"red",
1:"purple"
}
}).addTo(map)

}


function useGPS(){

navigator.geolocation.getCurrentPosition(

pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

userDistrict=findClosest(lat,lon)

map.setView([lat,lon],11)

if(userMarker) map.removeLayer(userMarker)

userMarker=L.marker([lat,lon]).addTo(map).bindPopup("ตำแหน่งของคุณ")

loadAll()

}

)

}


loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
