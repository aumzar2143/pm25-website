<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PM2.5 Lampang Research Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
color:white;
text-align:center;
transition:0.4s;
}

h2{
margin-top:10px;
}

.card{
background:rgba(0,0,0,0.8);
margin:15px;
padding:20px;
border-radius:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
margin:5px;
font-size:14px;
cursor:pointer;
}

.refresh{background:#00c853;color:white;}
.gps{background:#2962ff;color:white;}
.export{background:#ffc107;color:black;}

.rank{
background:#1a1a1a;
margin:5px;
padding:10px;
border-radius:10px;
}

.highlight{
border:2px solid white;
}

#map{
height:400px;
border-radius:15px;
}

</style>

</head>

<body>

<h2>🌫 PM2.5 จังหวัดลำปาง Dashboard</h2>

<div class="card">

<h1 id="pmValue">--</h1>
<p id="statusText">กำลังโหลด...</p>
<p id="aqiText"></p>
<p id="windText"></p>
<p id="locationText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>
<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

</div>


<div class="card">

<h3>🩺 คำแนะนำสุขภาพ</h3>

<p id="healthAdvice"></p>

</div>


<div class="card">

<h3>📊 แนวโน้ม PM2.5</h3>

<canvas id="chart"></canvas>

<p id="avgText"></p>
<p id="maxText"></p>
<p id="minText"></p>

</div>


<div class="card">

<h3>🏆 อันดับอำเภอ</h3>

<div id="ranking"></div>

</div>


<div class="card">

<h3>🗺 แผนที่ฝุ่น</h3>

<div id="map"></div>

</div>


<div class="card">

<button class="export" onclick="exportCSV()">📥 Export CSV</button>

</div>



<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let chart
let map
let markers=[]
let userDistrict=null


const districts={

"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]

}



function aqiColor(pm){

if(pm<=25) return "#2e7d32"
if(pm<=50) return "#f9a825"
if(pm<=100) return "#ef6c00"
if(pm<=150) return "#c62828"
return "#6a1b9a"

}


function advice(pm){

if(pm<=25) return "🟢 อากาศดี"
if(pm<=50) return "🟡 เริ่มมีผลกระทบ"
if(pm<=100) return "🟠 ควรใส่หน้ากาก"
if(pm<=150) return "🔴 หลีกเลี่ยงกิจกรรมกลางแจ้ง"
return "🟣 อันตรายมาก"

}



function healthAdvice(pm){

if(pm<=25){

return "อากาศดี สามารถทำกิจกรรมกลางแจ้งได้"

}

if(pm<=50){

return "ผู้ป่วยโรคปอดและหัวใจควรระวัง"

}

if(pm<=100){

return "ควรสวมหน้ากาก N95 และลดกิจกรรมกลางแจ้ง"

}

if(pm<=150){

return "หลีกเลี่ยงกิจกรรมกลางแจ้งและปิดบ้าน"

}

return "อันตรายมาก ควรอยู่ในอาคาร"

}



function pmToAQI(pm){

return Math.round(pm*4)

}



async function fetchPM(lat,lon){

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)

const data=await res.json()

let pm=data.data.iaqi.pm25?data.data.iaqi.pm25.v:0
let wind=data.data.iaqi.wd?data.data.iaqi.wd.v:"-"

return {pm,wind}

}



function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OSM'
}).addTo(map)

}



async function loadAll(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]
let windDir=""

for(const name in districts){

let [lat,lon]=districts[name]

let data=await fetchPM(lat,lon)

results.push({name,pm:data.pm,lat,lon})

windDir=data.wind

}


results.sort((a,b)=>b.pm-a.pm)


let html=""


results.forEach((d,i)=>{

let cls="rank"

if(d.name===userDistrict) cls+=" highlight"


html+=`<div class="${cls}">
${i+1}. ${d.name} - ${d.pm} µg/m³
</div>`


let circle=L.circle([d.lat,d.lon],{

radius:7000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.5

}).addTo(map)

.bindPopup(d.name+"<br>"+d.pm+" µg/m³")

markers.push(circle)

})


document.getElementById("ranking").innerHTML=html


let values=results.map(r=>r.pm)


let mainPM=results[0].pm

let avg=values.reduce((a,b)=>a+b)/values.length

let max=Math.max(...values)

let min=Math.min(...values)


document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText=advice(mainPM)
document.getElementById("healthAdvice").innerText=healthAdvice(mainPM)

document.getElementById("aqiText").innerText="AQI ประมาณ: "+pmToAQI(mainPM)

document.getElementById("windText").innerText="🌬 ทิศทางลม: "+windDir+"°"


document.getElementById("avgText").innerText="ค่าเฉลี่ยจังหวัด: "+avg.toFixed(2)
document.getElementById("maxText").innerText="ค่าสูงสุด: "+max
document.getElementById("minText").innerText="ค่าต่ำสุด: "+min


document.body.style.background=aqiColor(mainPM)


loadChart(values)

}



function loadChart(data){

if(chart) chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{
type:"bar",

data:{
labels:Object.keys(districts),

datasets:[
{
label:"PM2.5",
data:data
}
]
}

}

)

}



function useGPS(){

navigator.geolocation.getCurrentPosition(

pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("locationText").innerText=

"📍 "+lat.toFixed(4)+","+lon.toFixed(4)

userDistrict=findClosest(lat,lon)

loadAll()

}

)

}



function findClosest(lat,lon){

let min=999999
let closest=null

for(const name in districts){

let [dlat,dlon]=districts[name]

let dist=Math.hypot(lat-dlat,lon-dlon)

if(dist<min){

min=dist
closest=name

}

}

return closest

}



function exportCSV(){

let csv="District,PM2.5\n"

document.querySelectorAll(".rank").forEach(el=>{

csv+=el.innerText.replace(" - ",",")+"\n"

})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="pm25_lampang.csv"

a.click()

}



initMap()

loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
