<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyAir HealthyLife PM2.5 - Lampang</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
transition:background 1s;
background:linear-gradient(135deg,#74b9ff,#dfe6e9);
}

h2{
color:white;
margin-top:20px;
text-shadow:0 2px 5px rgba(0,0,0,0.3);
}

.card{
background:rgba(255,255,255,0.9);
margin:20px auto;
padding:25px;
border-radius:20px;
max-width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

#pmValue{
font-size:80px;
font-weight:bold;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
margin:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.refresh{background:#00b894;color:white;}
.gps{background:#0984e3;color:white;}

.rank{
background:#f1f5f9;
padding:12px;
margin:6px;
border-radius:10px;
}

#map{
height:420px;
border-radius:15px;
}

.legend{
text-align:left;
max-width:420px;
margin:auto;
}

canvas{
max-height:320px;
}

.alert{
background:#ff4d4d;
color:white;
padding:10px;
display:none;
font-weight:bold;
}

.sensor{
animation:pulseSensor 2s infinite;
}

@keyframes pulseSensor{
0%{opacity:0.6;}
50%{opacity:1;}
100%{opacity:0.6;}
}

#loading{
display:none;
font-size:18px;
margin:10px;
}

</style>
</head>

<body>

<div id="alertBox" class="alert">
🚨 ค่าฝุ่นเกินมาตรฐาน ควรสวมหน้ากาก N95
</div>

<h2>🌫 HappyAir HealthyLife PM2.5 - Lampang</h2>

<div id="loading">⏳ กำลังโหลดข้อมูล...</div>

<div class="card">

<div id="pmValue">--</div>

<p id="statusText">กำลังโหลดข้อมูล...</p>

<p id="locationText"></p>

<button class="refresh" onclick="loadAll()">🔄 รีเฟรช</button>
<button class="gps" onclick="useGPS()">📍 ใช้ตำแหน่งปัจจุบัน</button>

</div>

<div class="card">

<h3>🗺 แผนที่คุณภาพอากาศ</h3>

<div id="map"></div>

<div class="legend">

<b>ระดับคุณภาพอากาศ</b>

<div>🟢 0-25 อากาศดี</div>
<div>🟡 26-50 ปานกลาง</div>
<div>🟠 51-100 เริ่มมีผลกระทบ</div>
<div>🔴 101-150 มีผลต่อสุขภาพ</div>
<div>🟣 151+ อันตรายมาก</div>

</div>

</div>

<div class="card">

<h3>📊 กราฟ PM2.5</h3>
<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>🏆 อันดับอำเภอ</h3>
<div id="ranking"></div>

</div>

<script>

const token="05dc64914ef2d1b7c4d2678a15450338e660ea53"

let map
let chart
let markers=[]
let userMarker=null

let alertSound=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

const districts={
"เมืองลำปาง":[18.2888,99.4908],
"แม่เมาะ":[18.2923,99.7567],
"งาว":[18.7833,99.9667],
"แจ้ห่ม":[18.7167,99.6167],
"เกาะคา":[18.2000,99.3667],
"เถิน":[17.6333,99.2333],
"แม่พริก":[17.5167,99.1500],
"วังเหนือ":[19.1500,99.6000],
"เสริมงาม":[18.1167,99.1500],
"สบปราบ":[17.8833,99.3500],
"ห้างฉัตร":[18.3167,99.3500],
"เมืองปาน":[18.7667,99.4500],
"แม่ทะ":[18.1000,99.5667]
}

function aqiColor(pm){
if(pm<=25)return"#2ecc71"
if(pm<=50)return"#f1c40f"
if(pm<=100)return"#e67e22"
if(pm<=150)return"#e74c3c"
return"#8e44ad"
}

async function fetchPM(lat,lon){

try{

const res=await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=${token}`)
const data=await res.json()

if(data.status==="ok" && data.data && data.data.iaqi && data.data.iaqi.pm25){
return data.data.iaqi.pm25.v
}

return 0

}catch(e){

console.log("API error",e)
return 0

}

}

function initMap(){

map=L.map('map').setView([18.3,99.5],9)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

async function loadAll(){

document.getElementById("loading").style.display="block"

markers.forEach(m=>map.removeLayer(m))
markers=[]

let results=[]

for(const name in districts){

let [lat,lon]=districts[name]

let pm=await fetchPM(lat,lon)

results.push({name,pm,lat,lon})

}

results.sort((a,b)=>b.pm-a.pm)

let rankingHTML=""

results.forEach((d,i)=>{

rankingHTML+=`<div class="rank">${i+1}. ${d.name} - ${d.pm} µg/m³</div>`

let circle=L.circle([d.lat,d.lon],{

radius:3000,
color:aqiColor(d.pm),
fillColor:aqiColor(d.pm),
fillOpacity:0.5,
weight:2,
className:"sensor"

}).addTo(map)
.bindPopup(`<b>${d.name}</b><br>PM2.5 ${d.pm} µg/m³`)

markers.push(circle)

})

document.getElementById("ranking").innerHTML=rankingHTML

let mainPM=results[0].pm

document.getElementById("pmValue").innerText=mainPM+" µg/m³"
document.getElementById("statusText").innerText="ระดับอากาศ: "+mainPM

if(mainPM>100){

document.getElementById("alertBox").style.display="block"

try{
alertSound.play()
}catch(e){}

}else{

document.getElementById("alertBox").style.display="none"

}

loadChart(results.map(r=>r.pm))

document.getElementById("loading").style.display="none"

}

function loadChart(data){

if(!data || data.length===0) return

if(chart)chart.destroy()

chart=new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:Object.keys(districts),
datasets:[{
label:"PM2.5",
data:data
}]
}
}
)

}

function useGPS(){

navigator.geolocation.getCurrentPosition(async pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

if(userMarker)map.removeLayer(userMarker)

userMarker=L.marker([lat,lon]).addTo(map)
.bindPopup("ตำแหน่งของคุณ")
.openPopup()

map.setView([lat,lon],11)

})

}

initMap()
loadAll()

setInterval(loadAll,300000)

</script>

</body>
</html>
